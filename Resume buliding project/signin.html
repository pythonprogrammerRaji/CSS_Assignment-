<!DOCTYPE html>

<body>

            <div class="col-md-7 offset-md-3">

                <div class="card p-2 p-md-5 border-0 mt-5">

                    <div class="row">
                        <div class="col-12 col-sm-12 col-md-6">
                            <div class="login-left">
                                
                                <img src="" alt="">
