<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatting app</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="shortcut icon" href="asstess/chat (1).png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>
<body>
    <div class="container">
        <div class="card">
            <center>
                <h3>Create Account</h3>
            </center>
            <form>
                <label for="username">UserName</label><br/>
                <input type="text" name="name" id="username" placeholder="Enter Your Name" required>


                <label for="username">Email Address</label><br/>
                <input type="email" name="email" id="email" placeholder="Enter Your email" required>

                <label for="Password">Password</label><br/>
                <input type="Password" name="Password" id="password" placeholder="Create Password" required>
                <br/>
                <input type="checkbox" id="showPass" onchange="togglePassWord()"><label for="showPass">Show password</label>
                <br/>

                <label for="Password">Conform password</label><br/>
                <input type="Password" name="c_password" id="c_password" placeholder="Conform Password" required>

                <button type="button" onclick="createAccount()" id="btn">Create Account <br/><small>To Unlimited Features</small></button>

                <small>Do You Already Have An Account? <a href="/login.html">Log in</a></small>
            </form>
        </div>
    </div>

    <script>


        function togglePassWord(){
                var passwordFiled = document.getElementById("password");
                var checkbox = document.getElementById("showPass");

                passwordFiled.type = checkbox.checked ? "text" : "password";

            }
    </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/7.14.1-0/firebase.js"></script>

<script src="script.js"></script>

</body>
</html>
