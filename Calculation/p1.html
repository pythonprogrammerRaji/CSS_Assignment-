<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Calculator Project</title>
</head>
<body>
    <div class="container">
        <div>
            <h1>Calculator Project</h1>
            <input type="text" name="initial-scale" id="dispaly">
            <table>
                <tr>
                    <td colspan="2"><button style="width: 90%;">AD</button></td>
                    <td><button>DC</button></td>
                    <td><button>/</button></td>
                </tr>
                <tr>
                    <td><button>7</button></td>
                    <td><button>8</button></td>
                    <td><button>9</button></td>
                    <td><button>+</button></td>
                </tr>
                <tr>
                    <td><button>4</button></td>
                    <td><button>5</button></td>
                    <td><button>6</button></td>
                    <td><button>-</button></td>
                </tr>
                <tr>
                    <td><button>1</button></td>
                    <td><button>2</button></td>
                    <td><button>3</button></td>
                    <td><button>*</button></td>
                </tr>
                <tr>
                    <td><button>.</button></td>
                    <td colspan="2"><button style="width:90%;">0</button></td>
                    <td><button>=</button></td>
                </tr>
            </table>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
